name: Build and Upload EXE

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag
        required: true
        default: v1.0.0

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
  run: pyinstaller --onefile --windowed --add-data "config.yaml;." --name app main.py


      - name: Zip build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist/app.exe -DestinationPath release/app-windows.zip -Force

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.inputs.tag }}" release/app-windows.zip --clobber
